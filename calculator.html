<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calc">
      <input type="text" id="display" readonly />
      <div class="buttons">
        <button>C</button>
        <button>%</button>
        <button>⌫</button>
        <button>/</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>x</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>-</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>+</button>

        <button>00</button>
        <button>0</button>
        <button>.</button>
        <button>=</button>
      </div>
    </div>
    <script>
      let display = document.querySelector("#display");
      let buttons = document.querySelectorAll("button");
      let first = "";
      let second = "";
      let operator = "";
      buttons.forEach((btn) => {
        btn.addEventListener("click", function () {
          let val = btn.innerText;
          //console.log(val);
          if (!isNaN(val)) {
            if (operator === "") {
              first += val;
              console.log(first);
            } else {
              second += val;
              console.log(second);
            }
          } else if (val === ".") {
            if (operator === "") {
              if (!first.includes(".")) {
                first += ".";
              }
            } else {
              if (!second.includes(".")) {
                second += ".";
              }
            }
          } else if (val === "⌫") {
            if (second !== "") {
              second = second.slice(0, -1);
            } else if (operator !== "") {
              operator = "";
            } else {
              first = first.slice(0, -1);
            }
          } else if (val === "C") {
            first = "";
            second = "";
            operator = "";
          } else if (
            val == "+" ||
            val == "-" ||
            val == "x" ||
            val == "/" ||
            val == "%"
          ) {
            operator = val;
            // console.log(operator);
          } else if (val === "=") {
            let a = Number(first);
            let b = Number(second);
            let result = 0;
            if (operator === "+") {
              result = a + b;
            } else if (operator === "-") {
              result = a - b;
            } else if (operator === "x") {
              result = a * b;
            } else if (operator === "/") {
              result = a / b;
            } else if (operator === "%") {
              result = a % b;
            }
            display.value = result;

            first = result.toString();
            second = "";
            operator = "";
          }
          update();
        });
      });
      function update() {
        display.value = first + operator + second;
      }
    </script>
  </body>
</html>
